// ─── Helpers ────────────────────────────────────────────────────────────────
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function catBadge(cat) {
  const c = CATEGORY_COLORS[cat] || 'gray';
  return `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-${c}-100 text-${c}-800 dark:bg-${c}-900/30 dark:text-${c}-400">${CATEGORY_LABELS[cat] || cat}</span>`;
}
function catIcon(cat) {
  return `<svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">${CATEGORY_ICONS[cat] || CATEGORY_ICONS.custom}</svg>`;
}
function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }

function computeStats() {
  CATEGORIES = {};
  STATS = { connectors: 0, actions: 0, categories: 0, dangerous: 0 };
  for (const [name, spec] of Object.entries(DATA)) {
    STATS.connectors++;
    const cat = spec.category || 'custom';
    CATEGORIES[cat] = (CATEGORIES[cat] || 0) + 1;
    for (const action of Object.values(spec.actions || {})) {
      STATS.actions++;
      if (action.dangerous) STATS.dangerous++;
    }
  }
  STATS.categories = Object.keys(CATEGORIES).length;
}

function renderMarkdown(md) {
  marked.setOptions({
    highlight: function(code, lang) {
      if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
      return hljs.highlightAuto(code).value;
    },
    breaks: false, gfm: true
  });
  return marked.parse(md);
}

function initTheme() {
  const saved = localStorage.getItem('tc-theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const dark = saved === 'dark' || (!saved && prefersDark);
  applyTheme(dark);
}
function applyTheme(dark) {
  document.documentElement.classList.toggle('dark', dark);
  $('#icon-sun').classList.toggle('hidden', !dark);
  $('#icon-moon').classList.toggle('hidden', dark);
  $('#hljs-dark').disabled = !dark;
  $('#hljs-light').disabled = dark;
  localStorage.setItem('tc-theme', dark ? 'dark' : 'light');
}
$('#theme-toggle').addEventListener('click', () => {
  applyTheme(!document.documentElement.classList.contains('dark'));
});
$('#mobile-menu-btn').addEventListener('click', () => {
  $('#mobile-menu').classList.toggle('hidden');
});

// ─── Router ─────────────────────────────────────────────────────────────────
function router() {
  const hash = location.hash.slice(1) || '/';
  const app = $('#app');
  $('#mobile-menu').classList.add('hidden');

  // Update active nav link
  $$('.nav-link').forEach(a => {
    const href = a.getAttribute('href').slice(1);
    const isActive = hash === href || (href !== '/' && hash.startsWith(href));
    a.classList.toggle('text-brand-600', isActive);
    a.classList.toggle('dark:text-brand-400', isActive);
    a.classList.toggle('text-gray-600', !isActive);
    a.classList.toggle('dark:text-gray-400', !isActive);
  });

  if (hash === '/' || hash === '/home') return renderHome(app);
  if (hash === '/connectors') return renderConnectors(app);
  if (hash.startsWith('/connector/')) return renderConnectorDetail(app, hash.slice(11));
  if (hash === '/playground') return renderPlayground(app);
  if (hash === '/assistant') return renderAssistant(app);
  if (hash.startsWith('/docs')) return renderDocs(app, hash);
  if (hash === '/health') return renderHealth(app);

  app.innerHTML = `<div class="page-transition text-center py-20"><h2 class="text-2xl font-bold mb-4">Page not found</h2><a href="#/" class="text-brand-600 hover:underline">Back to home</a></div>`;
}

// ─── Page: Connectors ───────────────────────────────────────────────────────
function renderConnectors(el) {
  const params = new URLSearchParams(location.hash.includes('?') ? location.hash.split('?')[1] : '');
  const initQ = params.get('q') || '';
  const initCat = params.get('category') || '';

  const catOptions = Object.keys(CATEGORIES).sort().map(c =>
    `<option value="${c}" ${c === initCat ? 'selected' : ''}>${CATEGORY_LABELS[c] || c}</option>`
  ).join('');

  el.innerHTML = `<div class="page-transition">
    <div class="mb-8">
      <h1 class="text-3xl font-bold mb-2">Connectors</h1>
      <p class="text-gray-600 dark:text-gray-400">${STATS.connectors} connectors across ${STATS.categories} categories, providing ${STATS.actions} actions.</p>
    </div>
    <div class="flex flex-col sm:flex-row gap-3 mb-8">
      <div class="relative flex-1">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input id="conn-search" type="text" value="${esc(initQ)}" placeholder="Search connectors..." class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none">
      </div>
      <select id="conn-cat" class="px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 focus:ring-2 focus:ring-brand-500 outline-none">
        <option value="">All Categories</option>${catOptions}
      </select>
    </div>
    <div id="conn-grid"></div>
  </div>`;

  const searchEl = $('#conn-search');
  const catEl = $('#conn-cat');
  function filter() {
    const q = searchEl.value.toLowerCase().trim();
    const cat = catEl.value;
    const filtered = Object.values(DATA).filter(s => {
      if (cat && s.category !== cat) return false;
      if (q && !s.name.includes(q) && !s.display_name.toLowerCase().includes(q) && !s.description.toLowerCase().includes(q)) return false;
      return true;
    });
    renderConnectorGrid(filtered);
  }
  searchEl.addEventListener('input', filter);
  catEl.addEventListener('change', filter);
  filter();
}

function renderConnectorGrid(connectors) {
  const grid = $('#conn-grid');
  if (!connectors.length) {
    grid.innerHTML = '<div class="text-center py-12 text-gray-500 dark:text-gray-400">No connectors match your search.</div>';
    return;
  }
  // Group by category
  const groups = {};
  connectors.forEach(s => {
    const cat = s.category || 'custom';
    (groups[cat] = groups[cat] || []).push(s);
  });
  let html = '';
  for (const [cat, items] of Object.entries(groups).sort((a,b) => a[0].localeCompare(b[0]))) {
    const c = CATEGORY_COLORS[cat] || 'gray';
    html += `<div class="mb-8">
      <div class="flex items-center gap-2 mb-4">
        <div class="w-8 h-8 rounded-lg bg-${c}-100 dark:bg-${c}-900/30 text-${c}-600 dark:text-${c}-400 flex items-center justify-center">${catIcon(cat)}</div>
        <h2 class="text-lg font-semibold">${CATEGORY_LABELS[cat] || cat}</h2>
        <span class="text-sm text-gray-500 dark:text-gray-400">(${items.length})</span>
      </div>
      <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">`;
    for (const s of items.sort((a,b) => a.display_name.localeCompare(b.display_name))) {
      const actionCount = Object.keys(s.actions || {}).length;
      html += `<a href="#/connector/${s.name}" class="card-hover block p-4 rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900">
        <div class="flex items-start justify-between mb-2">
          <h3 class="font-semibold">${esc(s.display_name)}</h3>
          ${catBadge(cat)}
        </div>
        <p class="text-sm text-gray-600 dark:text-gray-400 mb-3 line-clamp-2">${esc(s.description)}</p>
        <div class="flex items-center gap-4 text-xs text-gray-500 dark:text-gray-400">
          <span class="flex items-center gap-1">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            ${actionCount} action${actionCount !== 1 ? 's' : ''}
          </span>
          <span class="uppercase tracking-wide">${esc(s.protocol)}</span>
        </div>
      </a>`;
    }
    html += '</div></div>';
  }
  grid.innerHTML = html;
}

// ─── Page: Connector Detail ─────────────────────────────────────────────────
function renderConnectorDetail(el, name) {
  const spec = DATA[name];
  if (!spec) {
    el.innerHTML = `<div class="page-transition text-center py-20"><h2 class="text-2xl font-bold mb-4">Connector not found</h2><a href="#/connectors" class="text-brand-600 hover:underline">Back to connectors</a></div>`;
    return;
  }
  const actions = Object.values(spec.actions || {});
  const dangerousCount = actions.filter(a => a.dangerous).length;

  let actionsHtml = '';
  for (const action of actions.sort((a,b) => a.name.localeCompare(b.name))) {
    const params = (action.parameters || []).filter(p => p.name);
    const paramsHtml = params.length ? params.map(p =>
      `<div class="flex items-start gap-2 py-1">
        <code class="text-xs px-1.5 py-0.5 rounded bg-gray-100 dark:bg-gray-800 text-brand-600 dark:text-brand-400 whitespace-nowrap">${esc(p.name)}</code>
        <span class="text-xs text-gray-500 dark:text-gray-400">${esc(p.type || 'any')}${p.required ? '' : ' (optional)'}</span>
        <span class="text-xs text-gray-600 dark:text-gray-300 flex-1">${esc(p.description || '')}</span>
      </div>`
    ).join('') : '<div class="text-xs text-gray-400">No parameters</div>';

    actionsHtml += `<div class="border border-gray-200 dark:border-gray-800 rounded-lg p-4 mb-3">
      <div class="flex items-center gap-2 mb-2">
        <code class="font-medium text-sm">${esc(action.name)}</code>
        ${action.dangerous ? '<span class="px-1.5 py-0.5 text-xs rounded bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400 font-medium">dangerous</span>' : ''}
        ${action.deprecated ? '<span class="px-1.5 py-0.5 text-xs rounded bg-yellow-100 dark:bg-yellow-900/30 text-yellow-700 dark:text-yellow-400 font-medium">deprecated</span>' : ''}
        ${action.idempotent ? '<span class="px-1.5 py-0.5 text-xs rounded bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 font-medium">idempotent</span>' : ''}
      </div>
      <p class="text-sm text-gray-600 dark:text-gray-400 mb-3">${esc(action.description || '')}</p>
      <div class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1">Parameters</div>
      <div class="space-y-0.5">${paramsHtml}</div>
      ${action.requires_scope ? `<div class="mt-2 text-xs text-gray-500 dark:text-gray-400">Scope: <code class="px-1 py-0.5 rounded bg-gray-100 dark:bg-gray-800">${esc(action.requires_scope)}</code></div>` : ''}
    </div>`;
  }

  const codeSnippet = `from toolsconnector import ToolKit

tk = ToolKit()
${name} = tk.get_connector("${name}")

# List available actions
print(${name}.actions)

# Execute an action
result = await ${name}.${actions[0]?.name || 'action'}(${
  (actions[0]?.parameters || []).filter(p => p.required).map(p => `${p.name}="..."`).join(', ')
})`;

  el.innerHTML = `<div class="page-transition">
    <div class="mb-6">
      <a href="#/connectors" class="inline-flex items-center gap-1 text-sm text-gray-500 dark:text-gray-400 hover:text-brand-600 dark:hover:text-brand-400 transition-colors mb-4">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        Back to connectors
      </a>
      <div class="flex flex-wrap items-center gap-3 mb-2">
        <h1 class="text-3xl font-bold">${esc(spec.display_name)}</h1>
        ${catBadge(spec.category)}
        <span class="px-2 py-0.5 text-xs rounded border border-gray-300 dark:border-gray-700 font-mono uppercase">${esc(spec.protocol)}</span>
      </div>
      <p class="text-gray-600 dark:text-gray-400 mb-4">${esc(spec.description)}</p>
      <div class="flex flex-wrap gap-4 text-sm text-gray-500 dark:text-gray-400">
        <span>${actions.length} action${actions.length !== 1 ? 's' : ''}</span>
        ${dangerousCount ? `<span class="text-red-500">${dangerousCount} dangerous</span>` : ''}
        <span>v${esc(spec.version || '0.1.0')}</span>
        ${spec.base_url ? `<span class="font-mono text-xs">${esc(spec.base_url)}</span>` : ''}
      </div>
    </div>

    <!-- Quick start -->
    <div class="mb-8">
      <h2 class="text-lg font-semibold mb-3">Quick Start</h2>
      <pre class="rounded-xl overflow-hidden"><code class="language-python hljs">${hljs.highlight(codeSnippet, {language: 'python'}).value}</code></pre>
    </div>

    <!-- Actions -->
    <div>
      <h2 class="text-lg font-semibold mb-4">Actions (${actions.length})</h2>
      ${actionsHtml}
    </div>
  </div>`;
}

          <label class="text-sm font-medium">Output</label>
          <div class="flex items-center gap-2">
            <span id="pg-count" class="text-xs text-gray-500 dark:text-gray-400"></span>
            <button id="pg-copy" class="text-xs px-3 py-1 rounded bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 transition-colors hidden">Copy</button>
          </div>
        </div>
        <pre id="pg-output" class="rounded-xl border border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-900 p-4 overflow-auto max-h-[600px] text-sm font-mono"><code class="text-gray-400">Select connectors and click Generate</code></pre>
      </div>
    </div>
  </div>`;

  $('#pg-generate').addEventListener('click', () => {
    const selected = Array.from($$('.pg-cb:checked')).map(cb => cb.value);
    if (!selected.length) { $('#pg-output').innerHTML = '<code class="text-yellow-500">Select at least one connector</code>'; return; }
    const framework = $('#pg-framework').value;
    const excludeDangerous = $('#pg-exclude-dangerous').checked;
    let result, count;
    if (framework === 'openai') {
      const r = toOpenAI(selected, excludeDangerous);
      result = r; count = r.length;
    } else if (framework === 'anthropic') {
      const r = toAnthropic(selected, excludeDangerous);
      result = r; count = r.length;
    } else {
      const r = toGemini(selected, excludeDangerous);
      result = r; count = r.length;
    }
    const json = JSON.stringify(result, null, 2);
    $('#pg-output').innerHTML = `<code class="language-json hljs">${hljs.highlight(json, {language: 'json'}).value}</code>`;
    $('#pg-count').textContent = `${count} tool${count !== 1 ? 's' : ''} generated`;
    const copyBtn = $('#pg-copy');
    copyBtn.classList.remove('hidden');
    copyBtn.onclick = () => {
      navigator.clipboard.writeText(json);
      copyBtn.textContent = 'Copied!';
      setTimeout(() => copyBtn.textContent = 'Copy', 1500);
    };
  });
}

function toOpenAI(connectors, excludeDangerous) {
  const tools = [];
  for (const name of connectors) {
    const spec = DATA[name]; if (!spec) continue;
    for (const [actionName, action] of Object.entries(spec.actions)) {
      if (excludeDangerous && action.dangerous) continue;
      tools.push({
        type: "function",
        function: {
          name: `${spec.name}_${actionName}`,
          description: `${spec.display_name}: ${action.description}`,
          parameters: action.input_schema || { type: "object", properties: {} }
        }
      });
    }
  }
  return tools;
}

function toAnthropic(connectors, excludeDangerous) {
  const tools = [];
  for (const name of connectors) {
    const spec = DATA[name]; if (!spec) continue;
    for (const [actionName, action] of Object.entries(spec.actions)) {
      if (excludeDangerous && action.dangerous) continue;
      tools.push({
        name: `${spec.name}_${actionName}`,
        description: `${spec.display_name}: ${action.description}`,
        input_schema: action.input_schema || { type: "object", properties: {} }
      });
    }
  }
  return tools;
}

function toGemini(connectors, excludeDangerous) {
  const declarations = [];
  for (const name of connectors) {
    const spec = DATA[name]; if (!spec) continue;
    for (const [actionName, action] of Object.entries(spec.actions)) {
      if (excludeDangerous && action.dangerous) continue;
      const schema = action.input_schema || { type: "object", properties: {} };
      declarations.push({
        name: `${spec.name}_${actionName}`,
        description: `${spec.display_name}: ${action.description}`,
        parameters: schema
      });
    }
  }
  return [{ function_declarations: declarations }];
}

// ─── Page: AI Assistant ─────────────────────────────────────────────────────
function renderAssistant(el) {
  const apiKey = localStorage.getItem('tc-openrouter-key') || '';
  const hasKey = apiKey.length > 0;

  el.innerHTML = `<div class="page-transition">
    <div class="mb-6">
      <h1 class="text-3xl font-bold mb-2">AI Assistant</h1>
      <p class="text-gray-600 dark:text-gray-400">Ask questions about ToolsConnector. Powered by OpenRouter (runs in your browser).</p>
    </div>

    ${!hasKey ? `<div id="api-key-section" class="max-w-lg mx-auto p-6 rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 mb-8">
      <h3 class="font-semibold mb-3">Enter your OpenRouter API key</h3>
      <p class="text-sm text-gray-600 dark:text-gray-400 mb-4">Your key is stored in your browser's localStorage only. It is never sent anywhere except OpenRouter's API. You can get a free key at <a href="https://openrouter.ai/keys" target="_blank" rel="noopener" class="text-brand-600 hover:underline">openrouter.ai/keys</a>.</p>
      <div class="flex gap-2">
        <input id="api-key-input" type="password" placeholder="sk-or-..." class="flex-1 px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 focus:ring-2 focus:ring-brand-500 outline-none font-mono text-sm">
        <button id="api-key-save" class="px-4 py-2 rounded-lg bg-brand-600 text-white font-medium hover:bg-brand-700 transition-colors">Save</button>
      </div>
    </div>` : ''}

    <div id="chat-container" class="${!hasKey ? 'opacity-50 pointer-events-none' : ''}">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2 text-sm text-gray-500 dark:text-gray-400">
          <span class="w-2 h-2 rounded-full ${hasKey ? 'bg-green-500' : 'bg-gray-400'}"></span>
          <span>${hasKey ? 'Connected' : 'No API key'}</span>
        </div>
        <div class="flex gap-2">
          <button id="chat-clear" class="text-xs px-3 py-1 rounded bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700">Clear chat</button>
          <button id="chat-key-btn" class="text-xs px-3 py-1 rounded bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700">${hasKey ? 'Change key' : 'Set key'}</button>
        </div>
      </div>
      <div id="chat-messages" class="border border-gray-200 dark:border-gray-800 rounded-xl bg-gray-50 dark:bg-gray-900 p-4 h-96 overflow-y-auto mb-4 space-y-4">
        <div class="chat-msg ml-auto bg-brand-50 dark:bg-brand-900/20 rounded-xl rounded-tr-sm p-3 text-sm">
          Welcome! I can help you with ToolsConnector -- ask me about connectors, actions, setup, or usage patterns.
        </div>
      </div>
      <div class="flex gap-2">
        <input id="chat-input" type="text" placeholder="Ask about ToolsConnector..." class="flex-1 px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 focus:ring-2 focus:ring-brand-500 outline-none" ${!hasKey ? 'disabled' : ''}>
        <button id="chat-send" class="px-5 py-2.5 rounded-lg bg-brand-600 text-white font-medium hover:bg-brand-700 transition-colors disabled:opacity-50" ${!hasKey ? 'disabled' : ''}>Send</button>
      </div>
    </div>
  </div>`;

  // API key management
  if (!hasKey) {
    $('#api-key-save').addEventListener('click', () => {
      const key = $('#api-key-input').value.trim();
      if (key) {
        localStorage.setItem('tc-openrouter-key', key);
        renderAssistant(el);
      }
    });
    $('#api-key-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') $('#api-key-save').click();
    });
  }

  const chatKeyBtn = $('#chat-key-btn');
  if (chatKeyBtn) {
    chatKeyBtn.addEventListener('click', () => {
      const newKey = prompt('Enter your OpenRouter API key:');
      if (newKey !== null) {
        if (newKey.trim()) {
          localStorage.setItem('tc-openrouter-key', newKey.trim());
        } else {
          localStorage.removeItem('tc-openrouter-key');
        }
        chatHistory = [];
        renderAssistant(el);
      }
    });
  }

  const clearBtn = $('#chat-clear');
  if (clearBtn) {
    clearBtn.addEventListener('click', () => {
      chatHistory = [];
      const msgs = $('#chat-messages');
      msgs.innerHTML = `<div class="chat-msg ml-auto bg-brand-50 dark:bg-brand-900/20 rounded-xl rounded-tr-sm p-3 text-sm">Chat cleared. Ask me anything about ToolsConnector.</div>`;
    });
  }

  // Chat send
  const sendBtn = $('#chat-send');
  const chatInput = $('#chat-input');
  if (sendBtn && hasKey) {
    const doSend = async () => {
      const msg = chatInput.value.trim();
      if (!msg) return;
      chatInput.value = '';
      sendBtn.disabled = true;
      chatInput.disabled = true;
      const msgs = $('#chat-messages');

      // Add user message
      msgs.innerHTML += `<div class="chat-msg ml-auto bg-brand-50 dark:bg-brand-900/20 rounded-xl rounded-tr-sm p-3 text-sm">${esc(msg)}</div>`;

      // Typing indicator
      const typingId = 'typing-' + Date.now();
      msgs.innerHTML += `<div id="${typingId}" class="chat-msg bg-gray-100 dark:bg-gray-800 rounded-xl rounded-tl-sm p-3 text-sm">
        <div class="typing-indicator flex gap-1"><span class="w-2 h-2 rounded-full bg-gray-400"></span><span class="w-2 h-2 rounded-full bg-gray-400"></span><span class="w-2 h-2 rounded-full bg-gray-400"></span></div>
      </div>`;
      msgs.scrollTop = msgs.scrollHeight;

      chatHistory.push({ role: 'user', content: msg });

      try {
        const response = await sendChat(chatHistory, apiKey);
        chatHistory.push({ role: 'assistant', content: response });
        const typingEl = document.getElementById(typingId);
        if (typingEl) {
          typingEl.innerHTML = `<div class="prose-content text-sm">${renderMarkdown(response)}</div>`;
          typingEl.classList.remove('p-3');
          typingEl.classList.add('p-4');
        }
      } catch (err) {
        const typingEl = document.getElementById(typingId);
        if (typingEl) {
          typingEl.innerHTML = `<div class="text-red-500 text-sm">Error: ${esc(err.message)}</div>`;
        }
      }
      msgs.scrollTop = msgs.scrollHeight;
      sendBtn.disabled = false;
      chatInput.disabled = false;
      chatInput.focus();
    };
    sendBtn.addEventListener('click', doSend);
    chatInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); } });
  }
}

function buildSystemPrompt() {
  const connectorSummary = Object.values(DATA).map(s => {
    const actions = Object.keys(s.actions || {}).join(', ');
    return `- ${s.display_name} (${s.name}): ${s.description} Actions: ${actions}`;
  }).join('\n');

  return `You are a helpful assistant for ToolsConnector, an open-source Python library that provides a universal tool integration layer for both traditional Python applications and AI agents.

Key facts:
- ToolsConnector has ${STATS.connectors} connectors with ${STATS.actions} actions across ${STATS.categories} categories
- Install: pip install toolsconnector
- Core class: ToolKit -- used to load connectors and generate schemas
- Works with OpenAI, Anthropic, Google Gemini, LangChain, and MCP
- Connectors use a consistent @action decorator pattern
- Auth is BYOK (Bring Your Own Key) -- users provide their own API keys
- Supports async/await natively
- Has built-in rate limiting, retries, and circuit breakers

Usage patterns:
\`\`\`python
from toolsconnector import ToolKit
tk = ToolKit()
# Get a connector
github = tk.get_connector("github")
# Execute action
issues = await github.list_issues(owner="user", repo="repo")
# Generate schemas for AI
tools = tk.to_openai_tools()
\`\`\`

Available connectors:
${connectorSummary}

Answer questions about connectors, their actions, setup, and usage patterns. Be concise and provide code examples when helpful. If asked about something outside ToolsConnector, politely redirect.`;
}

async function sendChat(messages, apiKey) {
  const systemPrompt = buildSystemPrompt();
  const apiMessages = [{ role: 'system', content: systemPrompt }, ...messages];

  const resp = await fetch('https://openrouter.ai/api/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${apiKey}`,
      'Content-Type': 'application/json',
      'HTTP-Referer': window.location.href,
      'X-Title': 'ToolsConnector Assistant'
    },
    body: JSON.stringify({
      model: 'qwen/qwen3-235b-a22b:free',
      messages: apiMessages,
      stream: false
    })
  });

  if (!resp.ok) {
    const errData = await resp.json().catch(() => ({}));
    throw new Error(errData.error?.message || `API request failed (${resp.status})`);
  }

  const data = await resp.json();
  return data.choices?.[0]?.message?.content || 'No response received.';
}

async function loadDoc(doc) {
  const contentEl = $('#doc-content');
  try {
    const resp = await fetch(GITHUB_RAW + doc.path);
    if (!resp.ok) throw new Error(`Failed to load (${resp.status})`);
    const md = await resp.text();
    contentEl.innerHTML = renderMarkdown(md);
  } catch (err) {
    // Fallback: show embedded docs
    contentEl.innerHTML = `<div class="text-center py-8">
      <p class="text-gray-500 dark:text-gray-400 mb-4">Could not load documentation from GitHub.</p>
      <p class="text-sm text-gray-400">${esc(err.message)}</p>
      <a href="https://github.com/SachinVardhan662/ToolsConnector/tree/main/docs/${doc.path}" target="_blank" rel="noopener" class="inline-block mt-4 text-brand-600 hover:underline">View on GitHub</a>
    </div>`;
  }
}

// ─── Page: Health ───────────────────────────────────────────────────────────
function renderHealth(el) {
  const connectors = Object.values(DATA).sort((a,b) => a.display_name.localeCompare(b.display_name));

  let totalActions = 0;
  let validSpecs = 0;
  let invalidSpecs = 0;
  const rows = connectors.map(spec => {
    const actionCount = Object.keys(spec.actions || {}).length;
    totalActions += actionCount;
    const hasName = !!spec.name;
    const hasDisplay = !!spec.display_name;
    const hasCategory = !!spec.category;
    const hasDescription = !!spec.description;
    const hasActions = actionCount > 0;
    const allActionsHaveSchema = Object.values(spec.actions || {}).every(a => a.input_schema && Object.keys(a.input_schema).length > 0);
    const valid = hasName && hasDisplay && hasCategory && hasDescription && hasActions && allActionsHaveSchema;
    if (valid) validSpecs++; else invalidSpecs++;

    const issues = [];
    if (!hasName) issues.push('missing name');
    if (!hasDisplay) issues.push('missing display_name');
    if (!hasCategory) issues.push('missing category');
    if (!hasDescription) issues.push('missing description');
    if (!hasActions) issues.push('no actions');
    if (!allActionsHaveSchema) issues.push('actions missing input_schema');

    return `<tr class="border-b border-gray-100 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-900/50">
      <td class="py-3 px-4"><a href="#/connector/${spec.name}" class="font-medium text-brand-600 dark:text-brand-400 hover:underline">${esc(spec.display_name)}</a></td>
      <td class="py-3 px-4 font-mono text-sm text-gray-500 dark:text-gray-400">${esc(spec.name)}</td>
      <td class="py-3 px-4">${catBadge(spec.category)}</td>
      <td class="py-3 px-4 text-center">${actionCount}</td>
      <td class="py-3 px-4 text-center font-mono text-xs uppercase">${esc(spec.protocol)}</td>
      <td class="py-3 px-4 text-center">
        ${valid
          ? '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400">Valid</span>'
          : `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400" title="${esc(issues.join(', '))}">Issues (${issues.length})</span>`}
      </td>
    </tr>`;
  }).join('');

  el.innerHTML = `<div class="page-transition">
    <div class="mb-8">
      <h1 class="text-3xl font-bold mb-2">Health Dashboard</h1>
      <p class="text-gray-600 dark:text-gray-400">Spec validation status for all connectors (static analysis from data.json).</p>
    </div>

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
      <div class="p-4 rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 text-center">
        <div class="text-2xl font-bold text-brand-600">${connectors.length}</div>
        <div class="text-xs text-gray-500 dark:text-gray-400">Connectors</div>
      </div>
      <div class="p-4 rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 text-center">
        <div class="text-2xl font-bold text-brand-600">${totalActions}</div>
        <div class="text-xs text-gray-500 dark:text-gray-400">Total Actions</div>
      </div>
      <div class="p-4 rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 text-center">
        <div class="text-2xl font-bold text-green-600">${validSpecs}</div>
        <div class="text-xs text-gray-500 dark:text-gray-400">Valid Specs</div>
      </div>
      <div class="p-4 rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 text-center">
        <div class="text-2xl font-bold ${invalidSpecs ? 'text-red-600' : 'text-green-600'}">${invalidSpecs}</div>
        <div class="text-xs text-gray-500 dark:text-gray-400">Invalid Specs</div>
      </div>
    </div>

    <div class="overflow-x-auto border border-gray-200 dark:border-gray-800 rounded-xl">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-gray-50 dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800">
            <th class="text-left py-3 px-4 font-semibold">Connector</th>
            <th class="text-left py-3 px-4 font-semibold">Name</th>
            <th class="text-left py-3 px-4 font-semibold">Category</th>
            <th class="text-center py-3 px-4 font-semibold">Actions</th>
            <th class="text-center py-3 px-4 font-semibold">Protocol</th>
            <th class="text-center py-3 px-4 font-semibold">Status</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

  initTheme();
  try {
    const resp = await fetch('data.json');
    if (!resp.ok) throw new Error('Failed to load data.json');
    DATA = await resp.json();
    computeStats();
  } catch (err) {
    $('#app').innerHTML = `<div class="text-center py-20"><h2 class="text-2xl font-bold mb-4 text-red-600">Failed to load data</h2><p class="text-gray-500">${esc(err.message)}</p></div>`;
    return;
  }
  window.addEventListener('hashchange', router);
  router();
}

init();

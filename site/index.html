// ── Logo cache ────────────────────────────────────────────────────────────────
// Brandfetch is hit at most once per unique domain per SPA session.
// Each response is stored as a blob URL in _logoCache and applied to every
// <img data-logo="url"> element that references the same URL.
// On subsequent renders (e.g. navigating back to /connectors) logos render
// instantly from the blob URL — zero additional network requests.
const _logoCache = new Map(); // url → blobUrl | 'err'

function _fetchAndCache(url) {
  if (_logoCache.has(url)) return;
  _logoCache.set(url, 'loading');
  fetch(url, { cache: 'force-cache' })
    .then(function(r) { if (!r.ok) throw r.status; return r.blob(); })
    .then(function(blob) {
      var blobUrl = URL.createObjectURL(blob);
      _logoCache.set(url, blobUrl);
      // Upgrade every already-rendered img that's waiting for this URL
      document.querySelectorAll('img[data-logo]').forEach(function(img) {
        if (img.getAttribute('data-logo') === url) img.src = blobUrl;
      });
    })
    .catch(function() { _logoCache.set(url, 'err'); });
}

// Call after any innerHTML update that contains <img data-logo="..."> elements.
function applyLogos(root) {
  (root || document).querySelectorAll('img[data-logo]').forEach(function(img) {
    var url = img.getAttribute('data-logo');
    if (!url) return;
    var cached = _logoCache.get(url);
    if (cached && cached !== 'loading' && cached !== 'err') {
      img.src = cached; // instant from memory
    } else {
      img.src = url;    // browser HTTP-cache may serve it immediately
      _fetchAndCache(url); // async upgrade to blob URL
    }
  });
}

function computeStats() {

  for (const [name, spec] of Object.entries(DATA)) {

    const cat = spec.category || 'custom';
    CATEGORIES[cat] = (CATEGORIES[cat] || 0) + 1;
    for (const action of Object.values(spec.actions || {})) {
      STATS.actions++;
      if (action.dangerous) STATS.dangerous++;
    }
  }
  STATS.categories = Object.keys(CATEGORIES).length;
}

// Rewrite relative .md links to SPA hash routes
function resolveDocLink(href) {
  // Strip anchor fragment first, restore later
  var fragment = '';
  var hashIdx = href.indexOf('#');
  if (hashIdx !== -1) { fragment = href.slice(hashIdx); href = href.slice(0, hashIdx); }
  if (!href) return fragment || '#';

  // Normalize: strip leading ../ and ./
  var norm = href.replace(/^(\.\.\/)+/, '').replace(/^\.\//, '');

  // connectors/README.md → #/connectors
  if (norm === 'connectors/README.md' || norm === 'connectors/README') return '#/connectors' + fragment;

  // Strip .md extension
  norm = norm.replace(/\.md$/, '');

  // guides/{name} → #/docs/{name}
  if (norm.startsWith('guides/')) return '#/docs/' + norm.slice(7) + fragment;

  // Connector category pages → #/docs/connectors-{name}
  var connCats = ['communication','code-platforms','project-management','crm','database','devops','ai-ml','finance','storage'];
  if (connCats.indexOf(norm) !== -1) return '#/docs/connectors-' + norm + fragment;

  // API.md → #/docs/api
  if (norm === 'API') return '#/docs/api' + fragment;

  // adding-connector.md → #/docs/adding-connector
  if (norm === 'adding-connector') return '#/docs/adding-connector' + fragment;

  // Fallback: #/docs/{name}
  return '#/docs/' + norm + fragment;
}

function renderMarkdown(md) {
  const renderer = new marked.Renderer();

  // ── Code blocks: hljs highlighting + mermaid diagrams ──
  renderer.code = function(codeOrObj, langArg) {
    let text, lang;
    if (typeof codeOrObj === 'object' && codeOrObj !== null) {
      text = codeOrObj.text || codeOrObj.code || '';
      lang = codeOrObj.lang || '';
    } else {
      text = codeOrObj || '';
      lang = langArg || '';
    }
    // Mermaid diagrams
    if (lang === 'mermaid') {
      const id = 'mermaid-' + Math.random().toString(36).slice(2, 9);
      return `<div class="mermaid-block" data-id="${id}">${esc(text)}</div>`;
    }
    try {
      const language = lang && hljs.getLanguage(lang) ? lang : null;
      const highlighted = language
        ? hljs.highlight(text, { language }).value
        : hljs.highlightAuto(text).value;
      const cls = language ? ` class="language-${language} hljs"` : ' class="hljs"';
      return `<pre><code${cls}>${highlighted}</code></pre>`;
    } catch(e) {
      return `<pre><code>${esc(text)}</code></pre>`;
    }
  };

  // ── Task lists: - [ ] and - [x] ──
  renderer.listitem = function(textOrObj) {
    let body;
    if (typeof textOrObj === 'object' && textOrObj !== null) {
      body = textOrObj.text || '';
    } else {
      body = textOrObj || '';
    }
    if (body.startsWith('<input')) {
      return `<li class="task-list-item">${body}</li>\n`;
    }
    // Manual check for [ ] and [x]
    const checkMatch = body.match(/^\[([ xX])\]\s*/);
    if (checkMatch) {
      const checked = checkMatch[1] !== ' ';
      const rest = body.slice(checkMatch[0].length);
      return `<li class="task-list-item"><input type="checkbox" disabled ${checked ? 'checked' : ''}> ${rest}</li>\n`;
    }
    return `<li>${body}</li>\n`;
  };

  // ── Links: rewrite relative .md paths to hash routes ──
  renderer.link = function(linkOrObj, titleArg, textArg) {
    let href, title, text;
    if (typeof linkOrObj === 'object' && linkOrObj !== null) {
      href = linkOrObj.href || '';
      title = linkOrObj.title || '';
      text = linkOrObj.text || '';
    } else {
      href = linkOrObj || '';
      title = titleArg || '';
      text = textArg || '';
    }
    // Only rewrite relative .md links (not http/https/# anchors)
    if (href && !href.startsWith('http') && !href.startsWith('#') && !href.startsWith('mailto:')) {
      href = resolveDocLink(href);
    }
    const titleAttr = title ? ` title="${esc(title)}"` : '';
    const external = href.startsWith('http') ? ' target="_blank" rel="noopener"' : '';
    return `<a href="${href}"${titleAttr}${external}>${text}</a>`;
  };

  // ── Images: add figure + caption from alt text ──
  renderer.image = function(imgOrObj, titleArg, altArg) {
    let href, title, alt;
    if (typeof imgOrObj === 'object' && imgOrObj !== null) {
      href = imgOrObj.href || '';
      title = imgOrObj.title || '';
      alt = imgOrObj.text || '';
    } else {
      href = imgOrObj || '';
      title = titleArg || '';
      alt = altArg || '';
    }
    // Shields.io badges — render inline, no figure
    if (href.includes('shields.io') || href.includes('img.shields.io')) {
      return `<img src="${href}" alt="${esc(alt)}" title="${esc(title)}">`;
    }
    // Regular images — wrap in figure with optional caption
    const caption = alt && alt !== href ? `<figcaption>${esc(alt)}</figcaption>` : '';
    return `<figure><img src="${href}" alt="${esc(alt)}" title="${esc(title)}" loading="lazy">${caption}</figure>`;
  };

  marked.setOptions({ breaks: false, gfm: true });
  let html = marked.parse(md, { renderer });

  // ── Admonitions: > **Note:** / > **Warning:** / > **Tip:** ──
  // Replace the entire blockquote in one pass to avoid breaking normal blockquotes
  html = html.replace(/<blockquote>\s*<p><strong>(Note|Warning|Tip|Info|Caution|Important):?<\/strong>\s*([\s\S]*?)<\/p>\s*<\/blockquote>/gi, function(match, type, content) {
    const t = type.toLowerCase();
    const icons = { note: '&#x1F4DD;', warning: '&#x26A0;&#xFE0F;', tip: '&#x1F4A1;', info: '&#x2139;&#xFE0F;', caution: '&#x1F6A8;', important: '&#x2757;' };
    const colors = { note: 'blue', warning: 'amber', tip: 'emerald', info: 'sky', caution: 'red', important: 'purple' };
    const c = colors[t] || 'blue';
    return `<div class="admonition admonition-${t} border-l-4 border-${c}-400 dark:border-${c}-600 bg-${c}-50 dark:bg-${c}-900/20 rounded-r-lg p-4 my-4"><p class="font-semibold text-${c}-700 dark:text-${c}-400 mb-1">${icons[t] || ''} ${type}</p><p>${content}</p></div>`;
  });

  return html;
}

// Post-render: activate mermaid blocks and KaTeX math
function postRenderMarkdown(containerEl) {
  if (!containerEl) return;

  // ── Mermaid ──
  const mermaidBlocks = containerEl.querySelectorAll('.mermaid-block');
  if (mermaidBlocks.length) {
    initMermaid();
    mermaidBlocks.forEach(async function(block) {
      try {
        const { svg } = await mermaid.render(block.dataset.id, block.textContent.trim());
        block.innerHTML = svg;
        block.classList.add('mermaid-rendered');
      } catch(e) {
        block.innerHTML = '<pre class="text-red-400 text-xs">Mermaid error: ' + esc(e.message) + '</pre>';
      }
    });
  }

  // ── KaTeX math: $..$ inline, $$...$$ display ──
  if (typeof renderMathInElement === 'function') {
    renderMathInElement(containerEl, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$', right: '$', display: false },
        { left: '\\(', right: '\\)', display: false },
        { left: '\\[', right: '\\]', display: true },
      ],
      throwOnError: false
    });
  }
}

// ─── Page: Connectors ───────────────────────────────────────────────────────
function renderConnectors(el) {
  const params = new URLSearchParams(location.hash.includes('?') ? location.hash.split('?')[1] : '');
  const initQ = params.get('q') || '';
  const initCat = params.get('category') || '';

  const catOptions = Object.keys(CATEGORIES).sort().map(c =>
    `<option value="${c}" ${c === initCat ? 'selected' : ''}>${CATEGORY_LABELS[c] || c}</option>`
  ).join('');

  el.innerHTML = `<div class="page-transition">
    <div class="mb-8">
      <h1 class="text-3xl font-bold mb-2">Connectors</h1>
      <p class="text-gray-600 dark:text-gray-400">${STATS.connectors} connectors across ${STATS.categories} categories, providing ${STATS.actions} actions.</p>
    </div>
    <div class="flex flex-col sm:flex-row gap-3 mb-8">
      <div class="relative flex-1">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input id="conn-search" type="text" value="${esc(initQ)}" placeholder="Search connectors..." class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none">
      </div>
      <select id="conn-cat" class="px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 focus:ring-2 focus:ring-brand-500 outline-none">
        <option value="">All Categories</option>${catOptions}
      </select>
    </div>
    <div id="conn-grid"></div>
  </div>`;

  const searchEl = $('#conn-search');
  const catEl = $('#conn-cat');
  function filter() {
    const q = searchEl.value.toLowerCase().trim();
    const cat = catEl.value;
    const filtered = Object.values(DATA).filter(s => {
      if (cat && s.category !== cat) return false;
      if (q && !s.name.includes(q) && !s.display_name.toLowerCase().includes(q) && !s.description.toLowerCase().includes(q)) return false;
      return true;
    });
    renderConnectorGrid(filtered);
  }
  searchEl.addEventListener('input', filter);
  catEl.addEventListener('change', filter);
  filter();
}

function renderConnectorGrid(connectors) {
  const grid = $('#conn-grid');
  if (!connectors.length) {
    grid.innerHTML = '<div class="text-center py-12 text-gray-500 dark:text-gray-400">No connectors match your search.</div>';
    return;
  }
  // Group by category
  const groups = {};
  connectors.forEach(s => {
    const cat = s.category || 'custom';
    (groups[cat] = groups[cat] || []).push(s);
  });
  let html = '';
  for (const [cat, items] of Object.entries(groups).sort((a,b) => a[0].localeCompare(b[0]))) {
    const c = CATEGORY_COLORS[cat] || 'gray';
    html += `<div class="mb-8">
      <div class="flex items-center gap-2 mb-4">
        <div class="w-8 h-8 rounded-lg bg-${c}-100 dark:bg-${c}-900/30 text-${c}-600 dark:text-${c}-400 flex items-center justify-center">${catIcon(cat)}</div>
        <h2 class="text-lg font-semibold">${CATEGORY_LABELS[cat] || cat}</h2>
        <span class="text-sm text-gray-500 dark:text-gray-400">(${items.length})</span>
      </div>
      <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">`;
    for (const s of items.sort((a,b) => a.display_name.localeCompare(b.display_name))) {
      const actionCount = Object.keys(s.actions || {}).length;
      const meta = s.meta || {};
      const logoUrl = meta.logo || '';
      const color = meta.color || '#6366f1';
      const initials = s.display_name.slice(0, 2).toUpperCase();
      const logoHtml = logoUrl
        ? `<img data-logo="${logoUrl}" src="" alt="${esc(s.display_name)}" class="w-9 h-9 rounded-lg object-contain" onerror="this.onerror=null;this.outerHTML='<div class=\\'w-9 h-9 rounded-lg flex items-center justify-center text-white font-bold text-xs\\' style=\\'background:${color}\\'>${initials}</div>'">`
        : `<div class="w-9 h-9 rounded-lg flex items-center justify-center text-white font-bold text-xs" style="background:${color}">${initials}</div>`;
      html += `<a href="#/connector/${s.name}" class="card-hover flex items-start gap-3 p-4 rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900">
        <div class="flex-shrink-0 mt-0.5">${logoHtml}</div>
        <div class="flex-1 min-w-0">

// ─── Page: Connector Detail (100% markdown) ────────────────────────────────
function renderConnectorDetail(el, name) {
  const spec = DATA[name];
  if (!spec) {
    el.innerHTML = `<div class="page-transition text-center py-20"><h2 class="text-2xl font-bold mb-4">Connector not found</h2><a href="#/connectors" class="text-brand-600 hover:underline">Back to connectors</a></div>`;
    return;
  }

  const md = spec.readme_md || `# ${esc(spec.display_name)}\n\n> ${esc(spec.description)}\n\nNo documentation available yet.`;
  let html = renderMarkdown(md);

  // Add IDs to h2 headings for sidebar scroll-spy
  let sidebarLinks = '';
  html = html.replace(/<h2(.*?)>(.*?)<\/h2>/gi, function(match, attrs, text) {
    const plainText = text.replace(/<[^>]+>/g, '');
    const id = plainText.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    sidebarLinks += `<a href="#" onclick="event.preventDefault();document.getElementById('${id}')?.scrollIntoView({behavior:'smooth',block:'start'})" class="block px-3 py-1.5 text-sm text-gray-500 dark:text-gray-400 hover:text-brand-600 dark:hover:text-brand-400 rounded truncate">${plainText}</a>\n`;
    return `<h2 id="${id}" class="scroll-mt-20"${attrs}>${text}</h2>`;
  });

  // Add copy buttons to code blocks
  html = html.replace(/<pre>/g, '<pre class="relative group">');
  html = html.replace(/<pre class="relative group"><code/g,
    '<pre class="relative group"><button onclick="navigator.clipboard.writeText(this.nextElementSibling.textContent.trim());this.textContent=\'Copied!\';setTimeout(()=>this.textContent=\'Copy\',1500)" class="absolute top-2 right-2 text-xs px-2 py-0.5 rounded bg-gray-700 text-gray-400 hover:text-white opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer">Copy</button><code');

  // Build DOM without template literals (html contains backticks from code blocks)
  var wrapper = document.createElement('div');
  wrapper.className = 'page-transition';

  var backLink = document.createElement('a');
  backLink.href = '#/connectors';
  backLink.className = 'inline-flex items-center gap-1 text-sm text-gray-500 dark:text-gray-400 hover:text-brand-600 dark:hover:text-brand-400 transition-colors mb-6';
  backLink.innerHTML = '<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg> Back to connectors';
  wrapper.appendChild(backLink);

  var flexRow = document.createElement('div');
  flexRow.className = 'flex gap-8';

  var nav = document.createElement('nav');
  nav.className = 'hidden lg:block w-52 flex-shrink-0';
  var navInner = document.createElement('div');
  navInner.className = 'sticky top-20 space-y-0.5 max-h-[calc(100vh-6rem)] overflow-y-auto pr-2';
  navInner.innerHTML = sidebarLinks;
  nav.appendChild(navInner);
  flexRow.appendChild(nav);

  var article = document.createElement('article');
  article.className = 'flex-1 min-w-0 prose-content';
  article.innerHTML = html;
  flexRow.appendChild(article);

  wrapper.appendChild(flexRow);
  el.innerHTML = '';
  el.appendChild(wrapper);

  // Activate mermaid + KaTeX after DOM insertion
  postRenderMarkdown(article);
}

    } else if (tab === 'schema') {
      var schema, cnt;
      if (res.framework === 'anthropic') { schema = toAnthropic(res.selected, res.excl); cnt = schema.length; }
      else if (res.framework === 'gemini') { schema = toGemini(res.selected, res.excl); cnt = schema[0].function_declarations.length; }
      else { schema = toOpenAI(res.selected, res.excl); cnt = schema.length; }
      var json = JSON.stringify(schema, null, 2);
      copyText = json;
      var instrHtml = '<div class="mb-4 flex items-center gap-3 p-3.5 rounded-xl bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-xs text-gray-600 dark:text-gray-300">' +
        '<span class="text-lg">📋</span>' +
        '<span><strong>' + cnt + ' tool schema' + (cnt !== 1 ? 's' : '') + '</strong> · Pass this array directly to <code class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 px-1.5 py-0.5 rounded font-mono">tools=</code> in your API call. Or use <code class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 px-1.5 py-0.5 rounded font-mono">kit.to_' + (res.framework === 'gemini' ? 'gemini' : res.framework === 'anthropic' ? 'anthropic' : 'openai') + '_tools()</code> at runtime.</span>' +
        '</div>';
      code = instrHtml + '<pre class="rounded-xl bg-gray-50 dark:bg-gray-950 border border-gray-200 dark:border-gray-800 overflow-x-auto max-h-[480px] text-sm leading-relaxed m-0"><code class="language-json hljs !bg-transparent !p-4 block">' + hljs.highlight(json, { language: 'json' }).value + '</code></pre>';
    } else {
      code = pgReferenceHtml(res.framework);
      copyText = '';
    }

    out.innerHTML = code;
    if (copyText) {
      cpBtn.classList.remove('hidden');
      cpBtn.onclick = function() {
        navigator.clipboard.writeText(copyText);
        cpBtn.textContent = '✓ Copied!';
        setTimeout(function() { cpBtn.textContent = 'Copy'; }, 1800);
      };
    } else {
      cpBtn.classList.add('hidden');
    }
  }
}

function toOpenAI(connectors, excludeDangerous) {
  const tools = [];
  for (const name of connectors) {
    const spec = DATA[name]; if (!spec) continue;
    for (const [actionName, action] of Object.entries(spec.actions)) {
      if (excludeDangerous && action.dangerous) continue;
      tools.push({
        type: "function",
        function: {
          name: `${spec.name}_${actionName}`,
          description: `${spec.display_name}: ${action.description}`,
          parameters: action.input_schema || { type: "object", properties: {} }
        }
      });
    }
  }
  return tools;
}

function toAnthropic(connectors, excludeDangerous) {
  const tools = [];
  for (const name of connectors) {
    const spec = DATA[name]; if (!spec) continue;
    for (const [actionName, action] of Object.entries(spec.actions)) {
      if (excludeDangerous && action.dangerous) continue;
      tools.push({
        name: `${spec.name}_${actionName}`,
        description: `${spec.display_name}: ${action.description}`,
        input_schema: action.input_schema || { type: "object", properties: {} }
      });
    }
  }
  return tools;
}

function toGemini(connectors, excludeDangerous) {
  const declarations = [];
  for (const name of connectors) {
    const spec = DATA[name]; if (!spec) continue;
    for (const [actionName, action] of Object.entries(spec.actions)) {
      if (excludeDangerous && action.dangerous) continue;
      const schema = action.input_schema || { type: "object", properties: {} };
      declarations.push({
        name: `${spec.name}_${actionName}`,
        description: `${spec.display_name}: ${action.description}`,
        parameters: schema
      });
    }
  }
  return [{ function_declarations: declarations }];
}

function getAIConfig() {
  return {
    provider: localStorage.getItem('tc_ai_provider') || 'openrouter',
    model: localStorage.getItem('tc_ai_model') || '',
    key: localStorage.getItem('tc_ai_key') || '',
  };
}
function saveAIConfig(cfg) {
  localStorage.setItem('tc_ai_provider', cfg.provider);
  localStorage.setItem('tc_ai_model', cfg.model);
  if (cfg.key !== undefined) localStorage.setItem('tc_ai_key', cfg.key);
}
function clearAIKey() {
  localStorage.removeItem('tc_ai_key');
}

function renderAssistant(el) {
  const cfg = getAIConfig();
  const prov = AI_PROVIDERS[cfg.provider] || AI_PROVIDERS.openrouter;
  const hasKey = cfg.key.length > 0;
  const defaultModel = cfg.model || prov.models[0]?.id || '';

  // Build provider options
  const provOpts = Object.entries(AI_PROVIDERS).map(([k,v]) =>
    `<option value="${k}" ${k === cfg.provider ? 'selected' : ''}>${v.name}</option>`

    <!-- Chat -->

  // ── Provider change → update model list + key link ──
  $('#ai-provider').addEventListener('change', function() {
    const p = AI_PROVIDERS[this.value];
    const modelSel = $('#ai-model');
    modelSel.innerHTML = p.models.map(m =>
      `<option value="${m.id}">${m.label} ${m.free ? '(free)' : '(paid)'}</option>`
    ).join('');

    $('#ai-key-link').textContent = 'Get a free API key from ' + p.name;
    $('#ai-key-input').placeholder = this.value === 'huggingface' ? 'hf_...' : 'sk-or-v1-...';
    saveAIConfig({ provider: this.value, model: p.models[0]?.id || '' });
  });

  $('#ai-model').addEventListener('change', function() {
    saveAIConfig({ provider: $('#ai-provider').value, model: this.value });
  });

  // ── Save / clear key ──
  $('#ai-key-save').addEventListener('click', () => {
    const key = $('#ai-key-input').value.trim();
    if (key) {
      saveAIConfig({ provider: $('#ai-provider').value, model: $('#ai-model').value, key });
      chatHistory = [];
      renderAssistant(el);
    }
  });
  $('#ai-key-input').addEventListener('keydown', e => { if (e.key === 'Enter') $('#ai-key-save').click(); });

  const clearKeyBtn = $('#ai-key-clear');
  if (clearKeyBtn) clearKeyBtn.addEventListener('click', () => { clearAIKey(); chatHistory = []; renderAssistant(el); });

  // ── Clear chat ──
  $('#chat-clear').addEventListener('click', () => {
    chatHistory = [];
    $('#chat-messages').innerHTML = '<div class="chat-msg bg-gray-100 dark:bg-gray-800 rounded-xl rounded-tl-sm p-3 text-sm">Chat cleared. Ask me anything.</div>';
  });

  // ── Send message ──
  if (hasKey) {
    const doSend = async () => {
      const chatInput = $('#chat-input'), sendBtn = $('#chat-send');
      const msg = chatInput.value.trim();
      if (!msg) return;
      chatInput.value = ''; sendBtn.disabled = true; chatInput.disabled = true;
      const msgs = $('#chat-messages');

      msgs.innerHTML += `<div class="chat-msg ml-auto bg-brand-50 dark:bg-brand-900/20 rounded-xl rounded-tr-sm p-3 text-sm">${esc(msg)}</div>`;
      const typingId = 'typing-' + Date.now();
      msgs.innerHTML += `<div id="${typingId}" class="chat-msg bg-gray-100 dark:bg-gray-800 rounded-xl rounded-tl-sm p-3 text-sm"><div class="typing-indicator flex gap-1"><span class="w-2 h-2 rounded-full bg-gray-400"></span><span class="w-2 h-2 rounded-full bg-gray-400"></span><span class="w-2 h-2 rounded-full bg-gray-400"></span></div></div>`;
      msgs.scrollTop = msgs.scrollHeight;

      chatHistory.push({ role: 'user', content: msg });
      const curCfg = getAIConfig();
      const curProv = AI_PROVIDERS[curCfg.provider] || AI_PROVIDERS.openrouter;

      try {
        const sysPrompt = SYS_PROMPT || 'You are a helpful assistant for ToolsConnector.';
        const apiMessages = [{ role: 'system', content: sysPrompt }, ...chatHistory];

        const resp = await fetch(curProv.url, {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + curCfg.key,
            'Content-Type': 'application/json',
            'HTTP-Referer': location.origin || location.href,
            'X-Title': 'ToolsConnector',
          },
          body: JSON.stringify({
            model: curCfg.model || curProv.models[0]?.id,
            messages: apiMessages,
            stream: false,
          }),
        });

        if (!resp.ok) {
          const errData = await resp.json().catch(() => ({}));
          if (resp.status === 401 || resp.status === 403) {
            clearAIKey();
            throw new Error('Invalid API key. It has been removed — please re-enter.');
          }
          throw new Error(errData.error?.message || 'API error ' + resp.status);
        }

        const data = await resp.json();
        const reply = data.choices?.[0]?.message?.content || 'No response.';
        chatHistory.push({ role: 'assistant', content: reply });
        const typingEl = document.getElementById(typingId);
        if (typingEl) {
          typingEl.innerHTML = '<div class="prose-content text-sm">' + renderMarkdown(reply) + '</div>';
          postRenderMarkdown(typingEl.querySelector('.prose-content'));
          typingEl.classList.remove('p-3'); typingEl.classList.add('p-4');
        }
      } catch (err) {
        const typingEl = document.getElementById(typingId);
        if (typingEl) typingEl.innerHTML = '<div class="text-red-500 text-sm">Error: ' + esc(err.message) + '</div>';
      }
      msgs.scrollTop = msgs.scrollHeight;
      sendBtn.disabled = false; chatInput.disabled = false; chatInput.focus();
    };
    $('#chat-send').addEventListener('click', doSend);
    $('#chat-input').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); } });
  }
}

// ─── Page: Docs ─────────────────────────────────────────────────────────────
function renderDocs(el, hash) {
  const parts = hash.split('/');
  const docId = parts[2] || 'quickstart';
  const currentDoc = DOCS_ALL.find(d => d.id === docId) || DOCS_ALL[0];

  // Build grouped sidebar
  let sidebar = '';
  for (const section of DOCS_SIDEBAR) {
    sidebar += `<h3 class="text-xs font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400 mt-4 mb-2 px-3">${section.heading}</h3>`;
    for (const d of section.items) {
      const active = d.id === currentDoc.id;
      sidebar += `<a href="#/docs/${d.id}" class="block px-3 py-1.5 rounded-lg text-sm ${active ? 'bg-brand-50 dark:bg-brand-900/20 text-brand-700 dark:text-brand-400 font-medium' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800'} transition-colors">${d.title}</a>`;
    }
  }

  // Get bundled content
  const docData = DOCS_CONTENT[currentDoc.id];
  let contentHtml = '';
  if (docData && docData.content) {
    contentHtml = renderMarkdown(docData.content);
  } else {
    contentHtml = `<div class="text-center py-12"><p class="text-gray-500 dark:text-gray-400 mb-4">Documentation page not found.</p>
      <a href="https://github.com/ToolsConnector/ToolsConnector/tree/main/docs" target="_blank" rel="noopener" class="text-brand-600 hover:underline">View docs on GitHub</a></div>`;
  }

  // Build DOM without template literals (contentHtml may contain backticks)
  var dWrapper = document.createElement('div');
  dWrapper.className = 'page-transition flex flex-col lg:flex-row gap-8';

  var aside = document.createElement('aside');
  aside.className = 'lg:w-56 flex-shrink-0';
  var asideInner = document.createElement('div');
  asideInner.className = 'lg:sticky lg:top-24 max-h-[calc(100vh-6rem)] overflow-y-auto';
  asideInner.innerHTML = sidebar;
  aside.appendChild(asideInner);
  dWrapper.appendChild(aside);

  var dArticle = document.createElement('article');
  dArticle.className = 'flex-1 min-w-0 prose-content';
  dArticle.innerHTML = contentHtml;
  dWrapper.appendChild(dArticle);

  el.innerHTML = '';
  el.appendChild(dWrapper);
  postRenderMarkdown(dArticle);
}

// ─── Page: Health ───────────────────────────────────────────────────────────
function renderHealth(el) {
  const connectors = Object.values(DATA).sort((a,b) => a.display_name.localeCompare(b.display_name));

  let totalActions = 0;
  let validSpecs = 0;
  let invalidSpecs = 0;
  const rows = connectors.map(spec => {
    const actionCount = Object.keys(spec.actions || {}).length;
    totalActions += actionCount;
    const hasName = !!spec.name;
    const hasDisplay = !!spec.display_name;
    const hasCategory = !!spec.category;
    const hasDescription = !!spec.description;
    const hasActions = actionCount > 0;
    const allActionsHaveSchema = Object.values(spec.actions || {}).every(a => a.input_schema && Object.keys(a.input_schema).length > 0);
    const valid = hasName && hasDisplay && hasCategory && hasDescription && hasActions && allActionsHaveSchema;
    if (valid) validSpecs++; else invalidSpecs++;

    const issues = [];
    if (!hasName) issues.push('missing name');
    if (!hasDisplay) issues.push('missing display_name');
    if (!hasCategory) issues.push('missing category');
    if (!hasDescription) issues.push('missing description');
    if (!hasActions) issues.push('no actions');
    if (!allActionsHaveSchema) issues.push('actions missing input_schema');

    return `<tr class="border-b border-gray-100 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-900/50">
      <td class="py-3 px-4"><a href="#/connector/${spec.name}" class="font-medium text-brand-600 dark:text-brand-400 hover:underline">${esc(spec.display_name)}</a></td>
      <td class="py-3 px-4 font-mono text-sm text-gray-500 dark:text-gray-400">${esc(spec.name)}</td>
      <td class="py-3 px-4">${catBadge(spec.category)}</td>
      <td class="py-3 px-4 text-center">${actionCount}</td>
      <td class="py-3 px-4 text-center font-mono text-xs uppercase">${esc(spec.protocol)}</td>
      <td class="py-3 px-4 text-center">
        ${valid
          ? '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400">Valid</span>'
          : `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400" title="${esc(issues.join(', '))}">Issues (${issues.length})</span>`}
      </td>
    </tr>`;
  }).join('');

  el.innerHTML = `<div class="page-transition">
    <div class="mb-8">
      <h1 class="text-3xl font-bold mb-2">Health Dashboard</h1>
      <p class="text-gray-600 dark:text-gray-400">Spec validation status for all connectors (static analysis from data.json).</p>
    </div>

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
      <div class="p-4 rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 text-center">
        <div class="text-2xl font-bold text-brand-600">${connectors.length}</div>
        <div class="text-xs text-gray-500 dark:text-gray-400">Connectors</div>
      </div>
      <div class="p-4 rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 text-center">
        <div class="text-2xl font-bold text-brand-600">${totalActions}</div>
        <div class="text-xs text-gray-500 dark:text-gray-400">Total Actions</div>
      </div>
      <div class="p-4 rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 text-center">
        <div class="text-2xl font-bold text-green-600">${validSpecs}</div>
        <div class="text-xs text-gray-500 dark:text-gray-400">Valid Specs</div>
      </div>
      <div class="p-4 rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 text-center">
        <div class="text-2xl font-bold ${invalidSpecs ? 'text-red-600' : 'text-green-600'}">${invalidSpecs}</div>
        <div class="text-xs text-gray-500 dark:text-gray-400">Invalid Specs</div>
      </div>
    </div>

    <div class="overflow-x-auto border border-gray-200 dark:border-gray-800 rounded-xl">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-gray-50 dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800">
            <th class="text-left py-3 px-4 font-semibold">Connector</th>
            <th class="text-left py-3 px-4 font-semibold">Name</th>
            <th class="text-left py-3 px-4 font-semibold">Category</th>
            <th class="text-center py-3 px-4 font-semibold">Actions</th>
            <th class="text-center py-3 px-4 font-semibold">Protocol</th>
            <th class="text-center py-3 px-4 font-semibold">Status</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

// ─── Init ───────────────────────────────────────────────────────────────────
async function init() {
  initTheme();
  try {
    const resp = await fetch('data.json');
    if (!resp.ok) throw new Error('Failed to load data.json');
    const raw = await resp.json();
    // New shape: { connectors: {...}, docs: {...}, meta: {...} }
    if (raw.connectors) {
      DATA = {};
      for (const [name, spec] of Object.entries(raw.connectors)) {
        DATA[name] = { ...spec, name };
      }
      DOCS_CONTENT = raw.docs || {};
      META = raw.meta || {};
      SYS_PROMPT = META.system_prompt || '';
    } else {
      // Legacy flat shape fallback
      DATA = raw;
      for (const [name, spec] of Object.entries(DATA)) {
        spec.name = name;
      }
    }
    computeStats();
  } catch (err) {
    $('#app').innerHTML = `<div class="text-center py-20"><h2 class="text-2xl font-bold mb-4 text-red-600">Failed to load data</h2><p class="text-gray-500">${esc(err.message)}</p></div>`;
    return;
  }
  window.addEventListener('hashchange', router);
  router();
}

init();

// ─── Global Search ─────────────────────────────────────────────────────────
(function() {
  var input = document.getElementById('global-search');
  var results = document.getElementById('global-search-results');
  if (!input || !results) return;

  input.addEventListener('input', function() {
    var q = this.value.toLowerCase().trim();
    if (q.length < 2) { results.classList.add('hidden'); return; }
    var matches = [];
    for (var name in DATA) {
      var s = DATA[name];
      var meta = s.meta || {};
      var haystack = (s.name + ' ' + s.display_name + ' ' + (s.description || '') + ' ' + (meta.tagline || '')).toLowerCase();
      if (haystack.includes(q)) {
        matches.push(s);
      }
    }
    if (!matches.length) {
      results.innerHTML = '<div class="px-4 py-3 text-sm text-gray-400">No connectors found</div>';
      results.classList.remove('hidden');
      return;
    }
    results.innerHTML = matches.slice(0, 8).map(function(s) {
      var logo = (s.meta && s.meta.logo) ? '<img data-logo="' + s.meta.logo + '" src="" class="w-5 h-5 rounded object-contain flex-shrink-0" onerror="this.style.display=\'none\'">' : '';
      return '<a href="#/connector/' + s.name + '" class="flex items-center gap-3 px-4 py-2.5 text-sm transition-colors">' +
        logo + '<div><div class="font-medium">' + esc(s.display_name) + '</div><div class="text-xs text-gray-400">' + Object.keys(s.actions || {}).length + ' actions</div></div></a>';
    }).join('');
    applyLogos(results);
    results.classList.remove('hidden');
  });

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      var first = results.querySelector('a');
      if (first) { first.click(); input.value = ''; results.classList.add('hidden'); }
    }
    if (e.key === 'Escape') { results.classList.add('hidden'); }
  });

  // Close on click outside
  document.addEventListener('click', function(e) {
    if (!document.getElementById('global-search-wrap').contains(e.target)) {
      results.classList.add('hidden');
    }
  });

  // Close on navigation
  window.addEventListener('hashchange', function() {
    input.value = '';
    results.classList.add('hidden');
  });
})();
</script>

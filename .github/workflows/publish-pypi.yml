name: Publish to PyPI

# Triggers (in order of preference for auto-runs):
#
#   (1) repository_dispatch { type: release-created } — fired by
#       release-please.yml after the Release Please PR merges and a
#       new tag + GitHub Release are created. This is the canonical
#       auto-publish path.
#
#       Why not `on: release: published`? GITHUB_TOKEN cannot chain
#       workflows via push/release events (security measure against
#       recursion). repository_dispatch IS one of the two events that
#       GITHUB_TOKEN is allowed to fire, so release-please.yml uses it
#       to hand off to this workflow explicitly.
#
#   (2) release:published — still useful for Releases created manually
#       via the GitHub UI or by a third-party tool. Will NOT fire for
#       Release Please bot-created releases (see above).
#
#   (3) push:tags v* — manual `git tag vX.Y.Z && git push --tags`.
#       Won't fire when the tag is pushed by GITHUB_TOKEN.
#
#   (4) workflow_dispatch — manual escape hatch from the Actions tab,
#       e.g. to re-run a failed publish or do a dry-run build.
#
# Tag history always equals PyPI release history (Release Please is the
# single source of truth for both).
on:
  repository_dispatch:
    types: [release-created]
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If true, build + twine-check but DO NOT upload to PyPI or create a Release'
        type: boolean
        required: false
        default: false

# Only one release can be in flight at a time.
concurrency:
  group: publish-pypi
  cancel-in-progress: false   # never cancel an in-flight PyPI upload

permissions:
  # We need contents:write to create a GitHub Release.
  contents: write
  # id-token:write enables PyPI Trusted Publishing (OIDC) — no long-lived
  # PYPI_API_TOKEN secret required. See:
  # https://docs.pypi.org/trusted-publishers/
  id-token: write
  # attestations:write enables SLSA build provenance — `actions/attest-build-provenance`
  # signs the wheel + sdist via Sigstore so users can verify "this artifact
  # came from this commit via this workflow." See:
  # https://docs.github.com/actions/security-for-github-actions/using-artifact-attestations/using-artifact-attestations-to-establish-provenance-for-builds
  attestations: write

jobs:
  publish:
    name: Build + Publish + Release
    runs-on: ubuntu-latest
    # The `pypi` environment is a SCOPING boundary for PyPI Trusted
    # Publishing — not a manual-approval gate. PyPI's trusted-publisher
    # config for this project requires the OIDC token to assert
    # `environment: pypi`, so the workflow must run inside that environment
    # for the OIDC handshake to succeed. The environment itself has zero
    # protection rules (no required reviewers, no wait timer), so the job
    # runs straight through with no human pause.
    #
    # The "conscious decision" gate for releases lives upstream — merging
    # the Release Please PR. Once that merges, this workflow runs end-to-end
    # without intervention.
    #
    # To add a manual approval gate back (e.g. when onboarding a
    # co-maintainer), add required reviewers to the environment via:
    #   gh api -X PUT repos/sachinshelke/ToolsConnector/environments/pypi \
    #       --input - <<< '{"reviewers":[{"type":"User","id":869601}]}'
    environment: pypi

    steps:
      # ── 0. Resolve the tag/ref this run targets ───────────────────────
      # For repository_dispatch: github.event.client_payload.tag  (chained from release-please)
      # For release events:      github.event.release.tag_name
      # For push:tags:           github.ref_name
      # For workflow_dispatch:   github.ref_name (whatever ref was selected)
      - name: Resolve target tag
        id: target
        run: |
          if [ -n "${{ github.event.client_payload.tag }}" ]; then
            TAG="${{ github.event.client_payload.tag }}"
            echo "Source: repository_dispatch from release-please"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            TAG="${{ github.event.release.tag_name }}"
            echo "Source: release event"
          else
            TAG="${{ github.ref_name }}"
            echo "Source: push/workflow_dispatch ref"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: ${TAG}"

      # ── 1. Checkout at the resolved tag ───────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.target.outputs.tag }}
          fetch-depth: 0   # full history so the release notes have context

      # ── 2. Python setup ───────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install build + twine
        run: pip install --upgrade build twine
        # twine is still installed for `twine check` — the actual upload
        # step uses pypa/gh-action-pypi-publish with OIDC.

      # ── 3. Verify tag matches pyproject.toml version ──────────────────
      # Prevents accidentally publishing v0.3.0 when pyproject says 0.2.1.
      - name: Check version alignment
        run: |
          TAG="${{ steps.target.outputs.tag }}"
          TAG_VERSION="${TAG#v}"
          PROJECT_VERSION=$(grep -E '^version' pyproject.toml | head -1 | sed -E 's/version = "(.+)"/\1/')
          echo "tag_version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Tag: ${TAG} -> ${TAG_VERSION}"
          echo "pyproject.toml: ${PROJECT_VERSION}"
          if [ "${TAG_VERSION}" != "${PROJECT_VERSION}" ]; then
            echo "::error::Tag ${TAG} does not match pyproject.toml version ${PROJECT_VERSION}"
            exit 1
          fi
        id: version

      # ── 3b. Short-circuit if version is already on PyPI ───────────────
      # Prevents spurious re-publish attempts when a tag ref is force-updated
      # (e.g. after a history rewrite) — the ref update fires `push: tags`,
      # but the payload bytes haven't changed from the user's perspective.
      # PyPI treats re-uploading an identical file as idempotent; this check
      # makes the behavior explicit and lets us skip the GitHub Release
      # update too (which would fail if the Release was created with a
      # now-stale target_commitish).
      - name: Check if version already on PyPI
        id: pypi_check
        run: |
          TAG_VERSION="${{ steps.version.outputs.tag_version }}"
          HTTP_CODE=$(curl -sI -o /dev/null -w "%{http_code}" \
            "https://pypi.org/pypi/toolsconnector/${TAG_VERSION}/json")
          if [ "${HTTP_CODE}" = "200" ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::toolsconnector ${TAG_VERSION} is already on PyPI. Skipping publish + Release update."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "toolsconnector ${TAG_VERSION} not on PyPI yet (HTTP ${HTTP_CODE}) — proceeding."
          fi

      # ── 4. Build + verify artifacts ───────────────────────────────────
      # Build even if already published so the GitHub Release can still
      # attach artifacts (backfill case). If both PyPI and the Release
      # are up-to-date, the later steps become no-ops.
      - name: Clean previous builds
        if: steps.pypi_check.outputs.already_published != 'true'
        run: rm -rf dist/ build/ *.egg-info

      - name: Build sdist + wheel
        if: steps.pypi_check.outputs.already_published != 'true'
        run: python -m build

      - name: Check artifacts with twine
        if: steps.pypi_check.outputs.already_published != 'true'
        run: twine check dist/*

      - name: Summarize artifacts
        if: steps.pypi_check.outputs.already_published != 'true'
        run: |
          echo "## Build artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ls -lh dist/ | tail -n +2 | awk '{print "- `" $NF "` (" $5 ")"}' >> $GITHUB_STEP_SUMMARY

      # ── 5. Dry-run short-circuit ──────────────────────────────────────
      - name: Dry run — stop before upload
        if: inputs.dry_run == true
        run: |
          echo "::notice::Dry run enabled. Skipping PyPI upload and GitHub Release."
          exit 0

      # ── 6a. Generate SLSA build provenance (Sigstore) ─────────────────
      # Signs the wheel + sdist with a short-lived Sigstore cert derived
      # from GitHub's OIDC token. The resulting attestation is stored on
      # the GitHub Attestations API and can be verified with:
      #   gh attestation verify dist/toolsconnector-X.Y.Z-py3-none-any.whl \
      #       --repo sachinshelke/ToolsConnector
      - name: Attest build provenance
        if: inputs.dry_run != true && steps.pypi_check.outputs.already_published != 'true'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'dist/*'

      # ── 6b. Upload to PyPI via Trusted Publishing (OIDC) ──────────────
      # No PYPI_API_TOKEN secret. GitHub's OIDC token is exchanged at PyPI's
      # token-minting endpoint for a short-lived upload token scoped to this
      # project + this workflow + this environment. Requires PyPI-side
      # configuration (one-time):
      #
      #   https://pypi.org/manage/project/toolsconnector/settings/publishing/
      #
      # Owner: sachinshelke, Repo: ToolsConnector,
      # Workflow filename: publish-pypi.yml, Environment: pypi
      - name: Upload to PyPI (Trusted Publishing)
        if: inputs.dry_run != true && steps.pypi_check.outputs.already_published != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # skip_existing makes the upload idempotent — a racy re-run
          # won't fail even if the version was just published.
          skip-existing: true
          # Print upload details to the job log for audit.
          verbose: true

      # ── 7. Attach build artifacts to the GitHub Release ───────────────
      # When fired by `release: published`, the Release already exists
      # (created by Release Please) — this step uploads the wheel + sdist
      # to it without recreating the Release entry or notes.
      # When fired by `push: tags` or workflow_dispatch, no Release exists
      # yet, so this step ALSO creates it with auto-generated notes.
      # Skipped entirely when the version is already on PyPI (nothing new
      # to attach — the prior release run already handled artifact upload).
      - name: Upload artifacts to GitHub Release
        if: inputs.dry_run != true && steps.pypi_check.outputs.already_published != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.target.outputs.tag }}
          # Only set name + auto-generate notes for tag/manual triggers;
          # skip on `release: published` so we don't overwrite the notes
          # Release Please already wrote.
          name: ${{ github.event_name == 'release' && '' || steps.target.outputs.tag }}
          generate_release_notes: ${{ github.event_name != 'release' }}
          files: dist/*
          draft: false
          prerelease: false

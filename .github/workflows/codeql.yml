name: CodeQL

# GitHub-native semantic code scanner. Runs CodeQL queries for Python,
# JavaScript/TypeScript, and GitHub Actions (SQL/command injection, XSS,
# path traversal, deserialisation, crypto misuse, hardcoded credentials,
# missing SRI on third-party scripts, etc.) and surfaces findings on the
# repo's Security tab.
#
# This is the "advanced setup" — it replaces GitHub Default Setup so we get
# the broader security-extended query suite AND on-demand branch scans
# (workflow_dispatch), which Default Setup does not support.
#
# Triggers:
#   • Every push to main
#   • Every PR to main
#   • Weekly schedule (Sundays at 03:00 UTC) so newly-published advisories
#     against pinned dependencies surface even without code changes
#   • Manual (workflow_dispatch) — scan any branch on demand, no PR needed
#
# Findings appear at: https://github.com/sachinshelke/ToolsConnector/security/code-scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # Docs/site/changelog-only PRs change no scannable code — don't pay for a
    # 3-language CodeQL run on them. (push-to-main + the weekly schedule still
    # scan the full tree, so coverage of main is unchanged.)
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'site/**'
      - 'CHANGELOG.md'
  schedule:
    - cron: '0 3 * * 0'   # Sunday 03:00 UTC
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write   # required to upload SARIF findings

# Cancel a superseded CodeQL run on the same ref (PR re-push / release-PR
# close+reopen) instead of paying for both. PR-only so a main scan is never
# interrupted.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Skip on release-please PRs: they only bump version + CHANGELOG, so the
    # code is byte-identical to the main commit CodeQL already scanned on the
    # merge that produced it. CodeQL is not a required check, so skipping it
    # here never blocks the release merge. (head_ref is empty on push/schedule
    # /dispatch, so those always run.)
    if: ${{ github.head_ref == '' || !startsWith(github.head_ref, 'release-please--') }}
    strategy:
      fail-fast: false
      matrix:
        # Match (and exceed) what GitHub Default Setup covered, so moving to
        # this advanced workflow loses no language coverage:
        #   python                → the connector library + Flask webapp
        #   javascript-typescript → the static site (site/) + webapp JS
        #   actions               → the GitHub Actions workflows themselves
        language: [python, javascript-typescript, actions]
    steps:
      - uses: actions/checkout@v6

      # Python toolchain is only needed for the Python extraction/autobuild.
      - if: matrix.language == 'python'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # security-extended = all default security queries + extra
          # security-relevant rules. Drops the 'quality' queries (unused
          # imports, cyclic imports, style hints) that ruff + our CI
          # already cover and that inflate the Security tab with noise.
          # Keeps everything that matters for CVEs: injection, deserialisation,
          # SSRF, path traversal, crypto misuse, hardcoded credentials, etc.
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'

name: CodeQL

# GitHub-native semantic code scanner. Runs CodeQL queries for Python
# security issues (SQL injection, command injection, deserialisation,
# crypto misuse, hardcoded credentials, etc.) and surfaces findings on
# the repo's Security tab.
#
# Triggers:
#   • Every push to main / feature/site-ui touching Python source
#   • Every PR to those branches touching Python source
#   • Weekly schedule (Sundays at 03:00 UTC) so newly-published advisories
#     against pinned dependencies surface even without code changes
#
# Findings appear at: https://github.com/sachinshelke/ToolsConnector/security/code-scanning

on:
  push:
    branches: [main, feature/site-ui]
    paths:
      - '**.py'
      - '.github/workflows/codeql.yml'
  pull_request:
    branches: [main, feature/site-ui]
    paths:
      - '**.py'
  schedule:
    - cron: '0 3 * * 0'   # Sunday 03:00 UTC
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write   # required to upload SARIF findings

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      # Set up the language toolchain so CodeQL can build / extract.
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          # security-extended = all default security queries + extra
          # security-relevant rules. Drops the 'quality' queries (unused
          # imports, cyclic imports, style hints) that ruff + our CI
          # already cover and that inflate the Security tab with noise.
          # Keeps everything that matters for CVEs: injection, deserialisation,
          # SSRF, path traversal, crypto misuse, hardcoded credentials, etc.
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:python'
